<svg aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" height="580" width="1000">
  <title>Zero Trust Architecture - Inspired by Google BeyondCorp</title>
  <desc id="desc">Earthworm94 Zero Trust Model: Verify Explicitly • Least Privilege • Assume Breach • Powered by Microsoft Entra ID</desc>
  
  
  <rect fill="#f8fafc" height="580" width="1000"></rect>
  
  
  <text fill="#1e3a8a" font-weight="bold" font-size="32" font-family="Arial Black, sans-serif" text-anchor="middle" y="45" x="500">Zero Trust Architecture</text>
  <text fill="#334155" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" y="72" x="500">Earthworm94 • Inspired by Google BeyondCorp • Never Trust, Always Verify</text>
  
  
  <rect stroke-width="6" stroke="#1e3a8a" fill="#1e40af" height="100" width="180" ry="15" rx="15" y="130" x="410"></rect>
  <text fill="#dbeafe" font-weight="bold" font-size="17" font-family="Arial" text-anchor="middle" y="165" x="500">Policy Engine</text>
  <text fill="#dbeafe" font-size="13" font-family="Arial" text-anchor="middle" y="185" x="500">Microsoft Entra ID + Conditional Access</text>
  <text fill="#93c5fd" font-size="12" font-family="Arial" text-anchor="middle" y="205" x="500">Continuous Verification • Trust Scoring</text>
  
  
  
  <rect stroke-width="4" stroke="#1e40af" fill="#3b82f6" rx="10" height="85" width="150" y="280" x="120"></rect>
  <text fill="white" font-weight="bold" font-size="15" font-family="Arial" text-anchor="middle" y="310" x="195">User Identity</text>
  <text fill="#dbeafe" font-size="11" font-family="Arial" text-anchor="middle" y="330" x="195">Entra ID • MFA • RBAC • PIM</text>
  
  
  <rect stroke-width="4" stroke="#1e40af" fill="#3b82f6" rx="10" height="85" width="150" y="390" x="120"></rect>
  <text fill="white" font-weight="bold" font-size="15" font-family="Arial" text-anchor="middle" y="420" x="195">Device Posture</text>
  <text fill="#dbeafe" font-size="11" font-family="Arial" text-anchor="middle" y="440" x="195">Intune Compliance • Health Signals</text>
  
  
  <path marker-end="url(#arrow)" stroke-width="4" stroke="#64748b" fill="none" d="M 270 320 Q 350 280 410 180"></path>
  <path marker-end="url(#arrow)" stroke-width="4" stroke="#64748b" fill="none" d="M 270 430 Q 350 380 410 205"></path>
  
  
  
  <rect stroke-width="4" stroke="#1e40af" fill="#2563eb" rx="10" height="85" width="150" y="280" x="720"></rect>
  <text fill="white" font-weight="bold" font-size="15" font-family="Arial" text-anchor="middle" y="310" x="795">Applications</text>
  <text fill="#dbeafe" font-size="11" font-family="Arial" text-anchor="middle" y="330" x="795">M365 • SharePoint • Custom Apps</text>
  
  
  <rect stroke-width="4" stroke="#1e40af" fill="#2563eb" rx="10" height="85" width="150" y="390" x="720"></rect>
  <text fill="white" font-weight="bold" font-size="15" font-family="Arial" text-anchor="middle" y="420" x="795">Data &amp; Infra</text>
  <text fill="#dbeafe" font-size="11" font-family="Arial" text-anchor="middle" y="440" x="795">Purview • Azure Resources • On-prem</text>
  
  
  <path marker-end="url(#arrow)" stroke-width="4" stroke="#64748b" fill="none" d="M 590 180 Q 670 250 720 305"></path>
  <path marker-end="url(#arrow)" stroke-width="4" stroke="#64748b" fill="none" d="M 590 205 Q 680 340 720 415"></path>
  
  
  <rect stroke-width="3" stroke="#1e40af" fill="#e0f2fe" rx="8" height="45" width="700" y="510" x="150"></rect>
  <text fill="#1e40af" font-size="14" font-family="Arial" text-anchor="middle" y="535" x="500">Assume Breach • Least Privilege • Explicit Verification • Micro-segmentation • Continuous Monitoring</text>
  
  
  <defs>
    <marker orient="auto" markerHeight="6" markerWidth="6" refY="5" refX="8" viewBox="0 0 10 10" id="arrow">
      <path fill="#64748b" d="M 0 0 L 10 5 L 0 10 Z"></path>
    </marker>
  </defs>
